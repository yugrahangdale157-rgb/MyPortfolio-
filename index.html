<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="ItzYUG — Founder & Full Stack Developer specializing in AI, Cloud Infrastructure, and Digital Solutions">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="robots" content="index, follow">
    <title>ItzYUG | Founder • Developer • Architect</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ========================================
           CSS CUSTOM PROPERTIES
           ======================================== */
        :root {
            --bg-primary: #08080f;
            --bg-secondary: #0f0f18;
            --bg-tertiary: #14141f;
            --surface: rgba(20, 20, 35, 0.5);
            --surface-hover: rgba(25, 25, 45, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-default: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.12);
            --text-primary: #ededf5;
            --text-secondary: #9898b0;
            --text-tertiary: #6b6b80;
            --accent-primary: #7c3aed;
            --accent-secondary: #06b6d4;
            --accent-tertiary: #f59e0b;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --glow-purple: rgba(124, 58, 237, 0.25);
            --glow-cyan: rgba(6, 182, 212, 0.2);
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --radius-2xl: 2rem;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-display: 'Manrope', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration-fast: 150ms;
            --duration-normal: 300ms;
            --duration-slow: 500ms;
        }

        /* ========================================
           RESET & BASE
           ======================================== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            position: relative;
        }

        /* ========================================
           SCROLLBAR
           ======================================== */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* ========================================
           SELECTION
           ======================================== */
        ::selection {
            background: rgba(124, 58, 237, 0.3);
            color: var(--text-primary);
        }

        /* ========================================
           ACCESSIBLE FOCUS STATES
           ======================================== */
        a:focus-visible,
        button:focus-visible,
        .card:focus-visible,
        .product-card:focus-visible,
        .mobile-nav-card:focus-visible,
        .cmdk-item:focus-visible,
        .input-field:focus-visible {
            outline: 2px solid var(--accent-secondary);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ========================================
           REDUCED MOTION
           ======================================== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* ========================================
           MAIN APPLICATION WRAPPER
           ======================================== */
        #app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        /* ========================================
           PAGE TRANSITIONS
           ======================================== */
        .page {
            display: none;
            min-height: 100vh;
            padding-top: 5rem;
            animation: pageEnter 0.5s var(--ease-out-expo);
        }

        .page.active {
            display: block;
        }

        @keyframes pageEnter {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========================================
           NAVIGATION BAR
           ======================================== */
        .navbar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: min(92%, 720px);
            padding: 10px 20px;
            background: rgba(12, 12, 20, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--border-default);
            border-radius: 100px;
            transition: all var(--duration-normal) var(--ease-out-expo);
        }

        .navbar.scrolled {
            background: rgba(12, 12, 20, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .nav-brand {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
            list-style: none;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 100px;
            transition: all var(--duration-fast) ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
        }

        .nav-link.active {
            color: #fff;
            background: rgba(124, 58, 237, 0.2);
        }

        /* ========================================
           COMMAND PALETTE TRIGGER (NAVBAR)
           ======================================== */
        .nav-cmdk-trigger {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 100px;
            border: 1px solid var(--border-default);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all var(--duration-fast) ease;
            margin-left: 8px;
        }

        .nav-cmdk-trigger:hover {
            color: var(--text-primary);
            border-color: var(--accent-primary);
            background: rgba(124, 58, 237, 0.08);
        }

        .nav-cmdk-trigger i {
            font-size: 0.7rem;
        }

        .nav-cmdk-kbd {
            font-family: var(--font-mono);
            color: var(--text-tertiary);
        }

        @media (max-width: 768px) {
            .nav-cmdk-kbd { display: none; }
        }

        /* ========================================
           MOBILE MENU TRIGGER
           ======================================== */
        .menu-trigger {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-default);
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
            transition: all var(--duration-fast) ease;
            z-index: 101;
        }

        .menu-trigger:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .menu-trigger span {
            display: block;
            width: 18px;
            height: 1.5px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all var(--duration-normal) var(--ease-out-expo);
        }

        .menu-trigger.active span:nth-child(1) {
            transform: translateY(5.5px) rotate(45deg);
        }
        .menu-trigger.active span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .menu-trigger.active span:nth-child(3) {
            transform: translateY(-5.5px) rotate(-45deg);
        }

        /* ========================================
           FULLSCREEN MOBILE NAVIGATION
           ======================================== */
        .mobile-nav-overlay {
            position: fixed;
            inset: 0;
            z-index: 99;
            background: rgba(6, 6, 12, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--ease-out-expo);
        }

        .mobile-nav-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .mobile-nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
        }

        .mobile-nav-card {
            background: rgba(20, 20, 35, 0.5);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s var(--ease-out-expo);
            opacity: 0;
            transform: translateY(20px);
        }

        .mobile-nav-overlay.active .mobile-nav-card {
            opacity: 1;
            transform: translateY(0);
        }

        .mobile-nav-card:hover {
            background: rgba(124, 58, 237, 0.15);
            border-color: rgba(124, 58, 237, 0.3);
            transform: translateY(-4px);
        }

        .mobile-nav-card i {
            font-size: 1.75rem;
            color: var(--accent-primary);
            margin-bottom: 8px;
            display: block;
        }

        .mobile-nav-card span {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* ========================================
           HERO SECTION
           ======================================== */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
            padding: 2rem;
            gap: 1.5rem;
        }

        .hero-avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .hero-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-strong);
            position: relative;
            z-index: 2;
        }

        .hero-avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent-primary), var(--accent-secondary), var(--accent-primary));
            animation: rotate 6s linear infinite;
            opacity: 0.6;
            filter: blur(8px);
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--accent-primary);
            font-family: var(--font-mono);
        }

        .hero-tag .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-success);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .hero-heading {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            max-width: 700px;
        }

        .hero-heading .highlight {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 550px;
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ========================================
           BUTTONS
           ======================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: transform var(--duration-normal) var(--ease-out-expo), box-shadow var(--duration-normal) ease, background var(--duration-normal) ease, border-color var(--duration-normal) ease, color var(--duration-normal) ease;
            text-decoration: none;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -60%;
            width: 40%;
            height: 100%;
            background: linear-gradient(115deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: skewX(-20deg);
            transition: left 0.65s ease;
            pointer-events: none;
        }

        .btn:hover::after {
            left: 130%;
        }

        .btn:active {
            transform: scale(0.96) !important;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: #fff;
            box-shadow: 0 4px 20px var(--glow-purple);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 34px var(--glow-purple);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-strong);
        }

        .btn-secondary:hover {
            background: rgba(124, 58, 237, 0.06);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            padding: 8px 16px;
        }

        .btn-ghost:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        /* ========================================
           CARD COMPONENT
           ======================================== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 24px;
            transition: transform var(--duration-normal) var(--ease-out-expo), border-color var(--duration-normal) ease, box-shadow var(--duration-normal) ease, background var(--duration-normal) ease;
            position: relative;
            overflow: hidden;
            --mx: 50%;
            --my: 50%;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            opacity: 0;
            transition: opacity var(--duration-normal) ease;
            z-index: 1;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(280px circle at var(--mx) var(--my), rgba(124, 58, 237, 0.12), transparent 70%);
            opacity: 0;
            transition: opacity var(--duration-normal) ease;
            pointer-events: none;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover::after {
            opacity: 1;
        }

        .card:hover {
            background: var(--surface-hover);
            border-color: rgba(124, 58, 237, 0.35);
            transform: translateY(-6px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(124, 58, 237, 0.08);
        }

        /* ========================================
           GRID LAYOUTS
           ======================================== */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        /* ========================================
           STAT CARDS
           ======================================== */
        .stat-card {
            background: rgba(124, 58, 237, 0.04);
            border: 1px solid rgba(124, 58, 237, 0.1);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            transition: all var(--duration-normal) ease;
        }

        .stat-card:hover {
            background: rgba(124, 58, 237, 0.08);
            border-color: rgba(124, 58, 237, 0.2);
            transform: translateY(-2px);
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ========================================
           ABOUT SECTION WRAPPER
           ======================================== */
        .about-section {
            padding: 60px 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ========================================
           TIMELINE (JOURNEY)
           ======================================== */
        .timeline {
            position: relative;
            padding-left: 32px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 6px;
            bottom: 6px;
            width: 1px;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary), transparent);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 32px;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -32px;
            top: 4px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
        }

        .timeline-year {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent-secondary);
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: block;
        }

        .timeline-title {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .timeline-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ========================================
           EXPERTISE CARDS
           ======================================== */
        .expertise-card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 22px;
            transition: all var(--duration-normal) var(--ease-out-expo);
        }

        .expertise-card:hover {
            border-color: var(--accent-primary);
            background: var(--surface-hover);
            transform: translateY(-3px);
        }

        .expertise-card i {
            font-size: 1.5rem;
            color: var(--accent-primary);
            margin-bottom: 12px;
            display: block;
        }

        .expertise-card h4 {
            font-family: var(--font-display);
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .expertise-skill {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            padding: 4px 0;
            border-top: 1px solid var(--border-subtle);
        }

        .expertise-skill:first-of-type {
            border-top: none;
        }

        /* ========================================
           TECH STACK PILLS
           ======================================== */
        .tech-group {
            margin-bottom: 24px;
        }

        .tech-group-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-tertiary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .tech-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-pill {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 7px 14px;
            border-radius: 100px;
            border: 1px solid var(--border-default);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            transition: all var(--duration-fast) ease;
        }

        .tech-pill:hover {
            border-color: var(--accent-secondary);
            color: var(--text-primary);
            background: rgba(6, 182, 212, 0.08);
        }

        /* ========================================
           PROCESS STEPS
           ======================================== */
        .process-step {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .process-step:last-child {
            border-bottom: none;
        }

        .process-number {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            opacity: 0.5;
            min-width: 48px;
        }

        .process-title {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .process-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* ========================================
           FAQ ACCORDION
           ======================================== */
        .faq-item {
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            overflow: hidden;
            background: var(--surface);
        }

        .faq-question {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .faq-question i {
            color: var(--accent-primary);
            transition: transform var(--duration-fast) ease;
            font-size: 0.8rem;
        }

                const doSwap = () => {
                    currentPage = page;
                    window.location.hash = page;
                    renderApp();

                    document.getElementById('mobileNavOverlay').classList.remove('active');
                    const trigger = document.getElementById('menuTrigger');
                    if (trigger) trigger.classList.remove('active');

                    window.scrollTo({ top: 0, behavior: 'instant' in window.scrollTo ? 'instant' : 'auto' });

                    const activePage = document.querySelector('.page.active');
                    if (typeof gsap !== 'undefined' && activePage) {
                        gsap.fromTo(activePage,
                            { opacity: 0, y: 24, filter: 'blur(6px)' },
                            { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.55, ease: 'power3.out' }

                        activePage.style.animation = 'none';
                        void activePage.offsetWidth;
                        activePage.style.animation = '';

                if (typeof gsap !== 'undefined' && currentActive && document.getElementById('appLoader') === null) {
                    gsap.to(currentActive, {
                        opacity: 0,
                        y: -16,

                e.preventDefault();

                const name = form.querySelector('[name="name"]')?.value.trim();

                const message = form.querySelector('[name="message"]')?.value.trim();

                if (!name || !email || !message) {
                    showToast('Please fill in all fields');
                    return;
                }

                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    showToast('Please enter a valid email address');
                    return;
                }

                const destination = appState.contact.email;
                if (!destination) {
                    showToast('No contact email configured yet');
                    return;

                const subject = `Portfolio inquiry from ${name}`;
                const body = `${message}\n\n— ${name} (${email})`;

                showToast('Expertise category added!');
            };
            const deleteExpertiseItem = (index) => {
                if (confirm('Delete this expertise category?')) {
                    appState.expertise.splice(index, 1);
                    saveState(appState);
                    editSection('expertise');
                    showToast('Expertise category deleted!');
                }
            };

            // ── Tech Stack ──
            const saveTechStack = () => {
                const groups = Object.keys(appState.techStack);
                const rebuilt = {};
                groups.forEach((oldName, i) => {
                    const newName = document.getElementById(`techGroupName${i}`)?.value.trim() || oldName;
                    const itemsRaw = document.getElementById(`techGroupItems${i}`)?.value ?? '';
                    rebuilt[newName] = itemsRaw.split(',').map(t => t.trim()).filter(Boolean);
                });
                appState.techStack = rebuilt;
                saveState(appState);
                renderApp();
                navigate('about');
                closeAdmin();
                showToast('Tech stack updated!');
            };
            const addTechGroup = () => {
                let name = 'New Group';
                let n = 1;
                while (appState.techStack[name] !== undefined) { name = `New Group ${++n}`; }
                appState.techStack[name] = ['Technology'];
                saveState(appState);
                editSection('techstack');
                showToast('Tech stack group added!');
            };
            const deleteTechGroup = (groupName) => {
                if (confirm(`Delete the "${groupName}" group?`)) {
                    delete appState.techStack[groupName];
                    saveState(appState);
                    editSection('techstack');
                    showToast('Tech stack group deleted!');
                }
            };

            // ── Process ──
            const saveProcess = () => {
                appState.process.forEach((p, i) => {
                    p.step = document.getElementById(`processStep${i}`)?.value || p.step;
                    p.title = document.getElementById(`processTitle${i}`)?.value || p.title;
                    p.description = document.getElementById(`processDesc${i}`)?.value || p.description;
                });
                saveState(appState);
                renderApp();
                navigate('about');
                closeAdmin();
                showToast('Work process updated!');
            };
            const addProcessItem = () => {
                const nextNum = String(appState.process.length + 1).padStart(2, '0');
                appState.process.push({ id: Date.now(), step: nextNum, title: 'New Step', description: 'Describe this step.' });
                saveState(appState);
                editSection('process');
                showToast('Process step added!');
            };
            const deleteProcessItem = (index) => {
                if (confirm('Delete this process step?')) {
                    appState.process.splice(index, 1);
                    saveState(appState);
                    editSection('process');
                    showToast('Process step deleted!');
                }
            };

            // ── Strengths ──
            const saveStrengths = () => {
                appState.strengths.forEach((s, i) => {
                    s.title = document.getElementById(`strengthTitle${i}`)?.value || s.title;
                    s.icon = document.getElementById(`strengthIcon${i}`)?.value || s.icon;
                    s.description = document.getElementById(`strengthDesc${i}`)?.value || s.description;
                });
                saveState(appState);
                renderApp();
                navigate('about');
                closeAdmin();
                showToast('Strengths updated!');
            };
            const addStrengthItem = () => {
                appState.strengths.push({ id: Date.now(), title: 'New Strength', icon: 'fa-star', description: 'Describe this strength.' });
                saveState(appState);
                editSection('strengths');
                showToast('Strength added!');
            };
            const deleteStrengthItem = (index) => {
                if (confirm('Delete this strength?')) {
                    appState.strengths.splice(index, 1);
                    saveState(appState);
                    editSection('strengths');
                    showToast('Strength deleted!');
                }
            };

            // ── FAQ ──
            const saveFaq = () => {
                appState.faq.forEach((f, i) => {
                    f.question = document.getElementById(`faqQuestion${i}`)?.value || f.question;
                    f.answer = document.getElementById(`faqAnswer${i}`)?.value || f.answer;
                });
                saveState(appState);
                renderApp();
                navigate('about');
                closeAdmin();
                showToast('FAQ updated!');
            };
            const addFaqItem = () => {
                appState.faq.push({ id: Date.now(), question: 'New question?', answer: 'Answer this question.' });
                saveState(appState);
                editSection('faq');
                showToast('FAQ question added!');
            };
            const deleteFaqItem = (index) => {
                if (confirm('Delete this FAQ item?')) {
                    appState.faq.splice(index, 1);
                    saveState(appState);
                    editSection('faq');
                    showToast('FAQ item deleted!');
                }
            };

            const resetAllData = () => {
                if (confirm('Reset ALL data to default? This cannot be undone!')) {
                    appState = JSON.parse(JSON.stringify(DEFAULT_STATE));
                    saveState(appState);
                    renderApp();
                    navigate('about');
                    closeAdmin();
                    showToast('All data reset to default!');
                }
            };

            // ========================================
            // COMMAND PALETTE
            // ========================================
            let cmdkSelectedIndex = 0;
            let cmdkResults = [];

            const getCmdkCommands = () => [
                { label: 'About', sub: 'go to', icon: 'fa-user', action: () => navigate('about') },
                { label: 'Services', sub: 'go to', icon: 'fa-cogs', action: () => navigate('services') },
                { label: 'Projects', sub: 'go to', icon: 'fa-code', action: () => navigate('projects') },
                { label: 'Products', sub: 'go to', icon: 'fa-box', action: () => navigate('products') },
                { label: 'Contact', sub: 'go to', icon: 'fa-envelope', action: () => navigate('contact') },
                { label: 'Copy email', sub: 'action', icon: 'fa-envelope', action: () => copyText(appState.contact.email) },
                { label: 'Copy Discord', sub: 'action', icon: 'fa-discord', action: () => copyText(appState.contact.discord) },
            ];

            const renderCmdkList = (query) => {
                const list = document.getElementById('cmdkList');
                if (!list) return;
                const q = query.trim().toLowerCase();
                const commands = getCmdkCommands();
                cmdkResults = q ? commands.filter(c => c.label.toLowerCase().includes(q)) : commands;
                cmdkSelectedIndex = 0;

                if (cmdkResults.length === 0) {
                    list.innerHTML = `<div class="cmdk-empty">No matching pages or commands</div>`;
                    return;
                }

                list.innerHTML = cmdkResults.map((c, i) => `
                    <div class="cmdk-item ${i === 0 ? 'selected' : ''}" data-index="${i}">
                        <i class="fas ${c.icon}"></i>
                        <span>${c.label}</span>
                        <span class="cmdk-item-sub">${c.sub}</span>
                    </div>
                `).join('');

                list.querySelectorAll('.cmdk-item').forEach(item => {
                    item.addEventListener('mouseenter', () => {
                        cmdkSelectedIndex = parseInt(item.dataset.index, 10);
                        updateCmdkSelection();
                    });
                    item.addEventListener('click', () => {
                        runCmdkSelection(parseInt(item.dataset.index, 10));
                    });
                });
            };

            const updateCmdkSelection = () => {
                const items = document.querySelectorAll('#cmdkList .cmdk-item');
                items.forEach((item, i) => item.classList.toggle('selected', i === cmdkSelectedIndex));
                const active = items[cmdkSelectedIndex];
                if (active) active.scrollIntoView({ block: 'nearest' });
            };

            const runCmdkSelection = (index) => {
                const cmd = cmdkResults[index];
                closeCmdk();
                if (cmd) cmd.action();
            };

            const toggleCmdk = () => {
                const overlay = document.getElementById('cmdkOverlay');
                if (!overlay) return;
                overlay.classList.contains('active') ? closeCmdk() : openCmdk();
            };

            const openCmdk = () => {
                const overlay = document.getElementById('cmdkOverlay');
                const input = document.getElementById('cmdkInput');
                if (!overlay || !input) return;
                overlay.classList.add('active');
                input.value = '';
                renderCmdkList('');
                setTimeout(() => input.focus(), 50);
            };

            const closeCmdk = () => {
                const overlay = document.getElementById('cmdkOverlay');
                if (overlay) overlay.classList.remove('active');
            };

            const initCmdk = () => {
                const overlay = document.getElementById('cmdkOverlay');
                const input = document.getElementById('cmdkInput');
                if (!overlay || !input) return;

                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) closeCmdk();
                });

                input.addEventListener('input', (e) => renderCmdkList(e.target.value));

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        cmdkSelectedIndex = Math.min(cmdkSelectedIndex + 1, cmdkResults.length - 1);
                        updateCmdkSelection();
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        cmdkSelectedIndex = Math.max(cmdkSelectedIndex - 1, 0);
                        updateCmdkSelection();
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        runCmdkSelection(cmdkSelectedIndex);
                    }
                });
            };

            const initScrollReveals = () => {
                if (typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') return;
                if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

                ScrollTrigger.getAll().forEach(st => st.kill());

                const revealTargets = document.querySelectorAll('.about-section, .page-container > .section-header');
                revealTargets.forEach(el => {
                    if (el.closest('.hero')) return;
                    gsap.fromTo(el,
                        { opacity: 0, y: 40 },
                        {
                            opacity: 1,
                            y: 0,
                            duration: 0.7,
                            ease: 'power3.out',
                            scrollTrigger: {
                                trigger: el,
                                start: 'top 85%',
                                toggleActions: 'play none none reverse'
                            }
                        }
                    );
                });

                const timelineItems = document.querySelectorAll('.timeline-item');
                if (timelineItems.length) {
                    gsap.fromTo(timelineItems,
                        { opacity: 0, x: -24 },
                        {
                            opacity: 1,
                            x: 0,
                            duration: 0.5,
                            stagger: 0.08,
                            ease: 'power2.out',
                            scrollTrigger: {
                                trigger: '.timeline',
                                start: 'top 80%',
                                toggleActions: 'play none none reverse'
                            }
                        }
                    );
                }

                const techGroups = document.querySelectorAll('.tech-group');
                if (techGroups.length) {
                    gsap.fromTo(techGroups,
                        { opacity: 0, y: 16 },
                        {
                            opacity: 1,
                            y: 0,
                            duration: 0.5,
                            stagger: 0.1,
                            ease: 'power2.out',
                            scrollTrigger: {
                                trigger: techGroups[0],
                                start: 'top 85%',
                                toggleActions: 'play none none reverse'
                            }
                        }
                    );
                }
            };

            // ========================================
            // EXPORT TO GLOBAL SCOPE
            // ========================================
            window._navigate = navigate;
            window._openCmdk = openCmdk;
            window._toggleMobileNav = toggleMobileNav;
            window._toggleFaq = toggleFaq;
            window._setProjectFilter = setProjectFilter;
            window._setProductFilter = setProductFilter;
            window._filterProjects = filterProjects;
            window._copyText = copyText;
            window._handleContact = handleContact;
            window._showAdmin = showAdminPanel;
            window._closeAdmin = closeAdmin;
            window._adminLogin = adminLogin;
            window._adminLogout = adminLogout;
            window._editSection = editSection;
            window._saveProfile = saveProfile;
            window._saveServices = saveServices;
            window._addServiceItem = addServiceItem;
            window._deleteServiceItem = deleteServiceItem;
            window._addProject = addProject;
            window._saveProjects = saveProjects;
            window._deleteProject = deleteProject;
            window._addProduct = addProduct;
            window._editProduct = editProduct;
            window._saveProductEdit = saveProductEdit;
            window._deleteProduct = deleteProduct;
            window._saveContact = saveContact;
            window._saveStats = saveStats;
            window._saveJourney = saveJourney;
            window._addJourneyItem = addJourneyItem;
            window._deleteJourneyItem = deleteJourneyItem;
            window._saveExpertise = saveExpertise;
            window._addExpertiseItem = addExpertiseItem;
            window._deleteExpertiseItem = deleteExpertiseItem;
            window._saveTechStack = saveTechStack;
            window._addTechGroup = addTechGroup;
            window._deleteTechGroup = deleteTechGroup;
            window._saveProcess = saveProcess;
            window._addProcessItem = addProcessItem;
            window._deleteProcessItem = deleteProcessItem;
            window._saveStrengths = saveStrengths;
            window._addStrengthItem = addStrengthItem;
            window._deleteStrengthItem = deleteStrengthItem;
            window._saveFaq = saveFaq;
            window._addFaqItem = addFaqItem;
            window._deleteFaqItem = deleteFaqItem;
            window._resetAllData = resetAllData;

            // ========================================
            // INITIALIZATION - FIXED
            // ========================================
            const init = () => {
                renderApp();
                initCmdk();

                if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
                    gsap.registerPlugin(ScrollTrigger);
                }

                const barEl = document.getElementById('ldBar');
                const pctEl = document.getElementById('ldPct');
                const dotsEl = document.getElementById('ldDots');
                let pct = 0;
                const pctTimer = setInterval(() => {
                    pct = Math.min(pct + Math.floor(Math.random() * 7) + 2, 100);
                    if (barEl) barEl.style.width = pct + '%';
                    if (pctEl) pctEl.textContent = pct + '%';
                    if (pct >= 100) clearInterval(pctTimer);
                }, 55);
                let dotCount = 0;
                const dotsTimer = setInterval(() => {
                    dotCount = (dotCount + 1) % 4;
                    if (dotsEl) dotsEl.textContent = '.'.repeat(dotCount);
                }, 400);
                setTimeout(() => { document.getElementById('ldl2')?.classList.add('on'); }, 500);
                setTimeout(() => { document.getElementById('ldl3')?.classList.add('on'); }, 1000);
                setTimeout(() => { document.getElementById('ldl4')?.classList.add('on'); }, 1500);

                const hideLoader = () => {
                    clearInterval(pctTimer);
                    clearInterval(dotsTimer);
                    const loader = document.getElementById('appLoader');
                    if (loader) {
                        loader.classList.add('hidden');
                        setTimeout(() => {
                            if (loader && loader.parentNode) {
                                loader.parentNode.removeChild(loader);
                            }
                        }, 500);
                    }
                };

                setTimeout(() => {
                    hideLoader();
                    const activePage = document.querySelector('.page.active');
                    if (typeof gsap !== 'undefined' && activePage) {
                        gsap.fromTo(activePage,
                            { opacity: 0, y: 24, filter: 'blur(6px)' },
                            { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.6, ease: 'power3.out' }
                        );
                        gsap.fromTo('.card, .product-card, .stat-card',
                            { opacity: 0, y: 26 },
                            { opacity: 1, y: 0, duration: 0.5, stagger: 0.06, delay: 0.15, ease: 'power2.out' }
                        );
                    }
                    initScrollReveals();
                }, 2200);

                const hash = window.location.hash.replace('#', '');
                if (hash === 'admin') {
                    showAdminPanel();
                } else if (hash && ['about', 'services', 'projects', 'products', 'contact'].includes(hash)) {
                    navigate(hash);
                }

                window.addEventListener('hashchange', () => {
                    const newHash = window.location.hash.replace('#', '');
                    if (newHash === 'admin') {
                        showAdminPanel();
                    } else if (['about', 'services', 'projects', 'products', 'contact'].includes(newHash)) {
                        navigate(newHash);
                    }
                });

                document.addEventListener('mousemove', (e) => {
                    const card = e.target.closest ? e.target.closest('.card') : null;
                    if (card) {
                        const rect = card.getBoundingClientRect();
                        card.style.setProperty('--mx', `${e.clientX - rect.left}px`);
                        card.style.setProperty('--my', `${e.clientY - rect.top}px`);
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        toggleCmdk();
                    }
                    if (e.key === 'Escape') {
                        closeCmdk();
                        closeAdmin();
                        const mobileNav = document.getElementById('mobileNavOverlay');
                        if (mobileNav) mobileNav.classList.remove('active');
                        const trigger = document.getElementById('menuTrigger');
                        if (trigger) trigger.classList.remove('active');
                    }
                });

                window.addEventListener('scroll', () => {
                    const navbar = document.getElementById('navbar');
                    if (navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);
                });

                console.log('%c🚀 ItzYUG Portfolio %cv3.0', 'color:#7c3aed;font-size:1.2rem;font-weight:bold;', 'color:#06b6d4;');
            };

            const forceHideLoader = () => {
                const loader = document.getElementById('appLoader');
                if (loader && loader.parentNode) {
                    loader.classList.add('hidden');
                    setTimeout(() => { if (loader.parentNode) loader.parentNode.removeChild(loader); }, 300);
                }
            };

            // Start app
            try {
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', () => {
                        try { init(); } catch (e) { console.error('App init failed:', e); forceHideLoader(); }
                    });
                } else {
                    init();
                }
            } catch (e) {
                console.error('App init failed:', e);
                forceHideLoader();
            }

            // Fallback loader removal — safety net in case init() hangs or a later async step never resolves
            setTimeout(forceHideLoader, 3500);

            window.addEventListener('error', forceHideLoader);

        })();
    </script>
</body>
</html>
